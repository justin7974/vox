name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Vox Version
      placeholder: e.g. v2.8
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: e.g. macOS 15.3
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press hotkey
        2. Speak "..."
        3. ...
